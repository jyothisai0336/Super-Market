---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: superlavish
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: superlavish
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: superlavish
spec:
  selector:
    app: cart-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: superlavish
spec:
  selector:
    app: order-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP

---
apiVersion: v1
kind: Service
