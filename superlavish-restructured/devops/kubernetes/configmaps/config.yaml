---
# ──────────────────────────────────────────────────────────────────────────────
# Namespace
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: superlavish
  labels:
    app: superlavish
    env: production

---
# ──────────────────────────────────────────────────────────────────────────────
# ConfigMap — Shared app config
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: superlavish-config
  namespace: superlavish
data:
  SPRING_PROFILES_ACTIVE: "prod"
  DB_PORT: "5432"
  CORS_ORIGINS: "https://superlavish.com,https://www.superlavish.com"
  LOG_LEVEL: "INFO"

---
# ──────────────────────────────────────────────────────────────────────────────
# Secret — Sensitive values (use AWS Secrets Manager / Vault in production)
# Replace base64 values: echo -n 'value' | base64
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: superlavish-secrets
  namespace: superlavish
type: Opaque
data:
  DB_PASSWORD: c3VwZXJsYXZpc2hfcHJvZA==      # superlavish_prod
  JWT_SECRET: c3VwZXJsYXZpc2hfand0X3NlY3JldF9rZXlfcHJvZHVjdGlvbl8yNTZfYml0cw==
  DB_USER: cG9zdGdyZXM=                        # postgres
