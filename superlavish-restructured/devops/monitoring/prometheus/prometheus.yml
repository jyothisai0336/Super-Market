global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: superlavish
    environment: production

# Alerting rules
rule_files:
  - "alerts/*.yml"

# Alertmanager config (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:

  # ── Prometheus self-monitoring ────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── Auth Service ──────────────────────────────────────────────────────────
  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['auth-service:8081']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: auth-service

  # ── Product Service ───────────────────────────────────────────────────────
  - job_name: product-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['product-service:8082']
    relabel_configs:
      - target_label: service
        replacement: product-service

  # ── Cart Service ──────────────────────────────────────────────────────────
  - job_name: cart-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['cart-service:8083']
    relabel_configs:
      - target_label: service
        replacement: cart-service

  # ── Order Service ─────────────────────────────────────────────────────────
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['order-service:8084']
    relabel_configs:
      - target_label: service
        replacement: order-service

  # ── API Gateway ───────────────────────────────────────────────────────────
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8080']
    relabel_configs:
      - target_label: service
        replacement: gateway

  # ── Node Exporter (host metrics) ──────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # ── PostgreSQL Exporter ───────────────────────────────────────────────────
  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── Kubernetes pods with prometheus annotations ───────────────────────────
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
