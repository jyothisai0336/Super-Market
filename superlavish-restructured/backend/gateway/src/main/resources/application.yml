server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${CORS_ORIGINS:http://localhost:3000}
            allowedMethods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
            allowedHeaders: ["*"]
            allowCredentials: true
            maxAge: 3600

      # Default filters applied to all routes
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 200

      routes:
        # ── Auth Service ───────────────────────────────────────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: auth-service
                fallbackUri: forward:/fallback/auth

        # ── Product Service ────────────────────────────────────────────────
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: product-service
                fallbackUri: forward:/fallback/products

        # ── Cart Service ───────────────────────────────────────────────────
        - id: cart-service
          uri: ${CART_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: cart-service
                fallbackUri: forward:/fallback/cart
            - name: AuthFilter   # JWT required for cart

        # ── Order Service ──────────────────────────────────────────────────
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0
            - name: CircuitBreaker
              args:
                name: order-service
                fallbackUri: forward:/fallback/orders
            - name: AuthFilter   # JWT required for orders

# JWT config (for gateway-level validation)
jwt:
  secret: ${JWT_SECRET:superlavish_secret_key_minimum_256_bits_long_replace_in_prod}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.superlavish: DEBUG
